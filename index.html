<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>RP Moda Policial</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoVnY4e0y7rkD2Rr8FQnFFmN3zD4VcmWwYyU75Y+0b4I7xB" crossorigin="anonymous"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="initializeGoogleSignIn()"></script>
     <script>
        function handleCredentialResponse(response) {
          console.log('Google ID token:', response.credential);
          // Aqui você pode enviar o token para o servidor ou processar o login.
          //caso o login seja bem-sucedido, exiba o poup-up com a mensagem bem-vindo e o nome do usuário, que pode ser extraído do token usando uma biblioteca JWT no backend ou frontend.
          const payload = JSON.parse(atob(response.credential.split('.')[1]));
          const userName = payload.name;

        }

        function initializeGoogleSignIn() {
          google.accounts.id.initialize({
            client_id: "279526279825-funokmsk6feafdkthprajc10at14mt12.apps.googleusercontent.com",
            callback: handleCredentialResponse
          });

          google.accounts.id.renderButton(
            document.getElementById('googleSignInContainer'),
            { theme: 'filled_black', size: 'large', width: '100%', text: 'signin_with', shape: 'pill' }
          );
        }

      
     </script>
  </head>
  <body>

        
    <div class="logo-container">             
      <img src="img/rpmodapolicial.png" alt="Logomarca RP Moda Policial" class="img-fluid mx-auto d-block" style="max-width: 180px;" loading="lazy">
    </div>
        
    <div class="login-container">
      <div class="login-box">
        <h2 class="text-center mb-4">Login</h2>
        <div class="dark-form">
          <form data-bs-theme="dark" novalidate>
            <div class="mb-3">
              <label for="email" class="text-light form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
              <small class="form-text text-muted">Seus dados são protegidos e nunca serão compartilhados.</small>
            </div>
            <div class="mb-4">
              <label for="password" class="text-light form-label">Senha</label>
              <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-outline-light">Entrar</button>
            </div>
          </form>
          
        </div>
        <div id="googleSignInContainer" class="d-grid gap-2 mt-2"></div>
      </div>
    </div>
    
  </body>
 
</html>
