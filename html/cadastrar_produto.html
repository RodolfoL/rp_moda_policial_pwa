<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>Cadastrar Produto | RP Moda Policial</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="../js/script_cadastrar_produto.js" defer></script>

  </head>
  <body>
    <div class="container py-5">
      <div class="text-center mb-4">
        <img src="../img/rpmodapolicial.png" alt="Logomarca RP Moda Policial" class="img-fluid mx-auto d-block" style="max-width: 180px;" loading="lazy">
        <h1 class="h3 mt-3">Cadastrar Produto</h1>
      </div>
      <div class="card shadow-sm">
        <div class="card-body">
          <form id="productForm" data-bs-theme="dark" novalidate>
            <div class="mb-3">
              <label for="productImage" class="form-label">Imagem do produto</label>
              <input class="form-control" type="file" id="productImage" name="productImage" accept="image/png,image/jpeg" required>
              <div class="form-text">PNG ou JPEG. A imagem será salva em ../img/produtos/ com o nome do produto.</div>
            </div>
            <div class="mb-3">
              <label for="productName" class="form-label">Nome do produto</label>
              <input type="text" class="form-control" id="productName" name="productName" placeholder="Nome do produto" required>
            </div>
            <div class="mb-3">
              <label for="productPrice" class="form-label">Valor</label>
              <input type="number" class="form-control" id="productPrice" name="productPrice" placeholder="0,00" step="0.01" min="0" required>
            </div>
            <div class="mb-3">
              <label for="productDescription" class="form-label">Descrição</label>
              <textarea class="form-control" id="productDescription" name="productDescription" rows="3" placeholder="Breve descrição do produto" required></textarea>
            </div>
            <div class="mb-3">
              <label for="productCommission" class="form-label">Comissão</label>
              <input type="number" class="form-control" id="productCommission" name="productCommission" placeholder="0" step="0.01" min="0" required>
              <div class="form-text">Informe a comissão do produto.</div>
            </div>
            <div class="d-flex justify-content-between">
              <button type="submit" class="btn btn-primary">Cadastrar</button>
              <button type="reset" class="btn btn-secondary">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoVnY4e0y7rkD2Rr8FQnFFmN3zD4VcmWwYyU75Y+0b4I7xB" crossorigin="anonymous"></script>
  </body>
</html>
